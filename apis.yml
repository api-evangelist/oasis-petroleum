name: Oasis Petroleum
description: |
  Oasis Petroleum was an independent exploration and production (E&P) company
  focused on unconventional crude oil and natural gas resources in the Williston
  Basin (Bakken and Three Forks formations) of North Dakota and Montana.

  Oasis Petroleum no longer exists as a standalone entity. On July 1, 2022,
  Oasis Petroleum and Whiting Petroleum completed a merger of equals to form
  Chord Energy Corporation (NASDAQ: CHRD), creating one of the largest pure-play
  Williston Basin operators. The legacy oasispetroleum.com domain redirects to
  chordenergy.com.

  No public developer program, APIs, SDKs, OpenAPI specifications, or machine-
  readable interfaces were ever published by Oasis Petroleum, and none exist
  under the successor entity.
